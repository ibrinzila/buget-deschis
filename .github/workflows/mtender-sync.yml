name: MTender sync

on:
  schedule:
    # Nightly at 02:17 UTC (05:17 EEST). Bootstrap is intentionally slow —
    # one pass per day is plenty once the historical backfill is caught up,
    # and MTender rarely publishes > a few dozen new tenders per day.
    - cron: '17 2 * * *'
  workflow_dispatch:
    inputs:
      max_batches:
        description: 'Max batches to pull in one run (default 200 ~ 4k records at 20/batch)'
        required: false
        default: '200'

concurrency:
  group: mtender-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 330 # just under GitHub's 6h free tier cap
    env:
      BASE_URL: ${{ secrets.MTENDER_SYNC_BASE_URL }}
      SYNC_KEY: ${{ secrets.MTENDER_SYNC_KEY }}
    steps:
      - name: Validate secrets
        run: |
          if [ -z "$BASE_URL" ] || [ -z "$SYNC_KEY" ]; then
            echo "Missing MTENDER_SYNC_BASE_URL or MTENDER_SYNC_KEY secret" >&2
            exit 1
          fi
          echo "Target: ${BASE_URL%/}/api/mtender-sync"

      - name: Loop sync batches until drained
        run: |
          set -euo pipefail
          MAX=${{ github.event.inputs.max_batches || '200' }}
          COUNT=0
          FAILS=0
          MAX_FAILS=5
          BASE="${BASE_URL%/}/api/mtender-sync?key=${SYNC_KEY}"
          # Thread the cursor through request/response to sidestep KV
          # read-after-write staleness across Worker invocations.
          CURSOR=""
          while [ "$COUNT" -lt "$MAX" ]; do
            if [ -n "$CURSOR" ]; then
              ENCODED=$(printf '%s' "$CURSOR" | jq -sRr @uri)
              URL="${BASE}&cursor=${ENCODED}"
            else
              URL="$BASE"
            fi
            RESP=$(curl -sS --max-time 60 "$URL") || RESP=""
            echo "$RESP" | head -c 400; echo
            OK=$(printf '%s' "$RESP" | jq -r '.ok // false' 2>/dev/null || echo false)
            DRAINED=$(printf '%s' "$RESP" | jq -r '.drained // false' 2>/dev/null || echo false)
            LISTED=$(printf '%s' "$RESP" | jq -r '.listed // 0' 2>/dev/null || echo 0)
            NEXT=$(printf '%s' "$RESP" | jq -r '.newCursor // empty' 2>/dev/null || echo "")
            if [ "$OK" != "true" ]; then
              FAILS=$((FAILS + 1))
              echo "Batch error ($FAILS/$MAX_FAILS). Backing off..." >&2
              if [ "$FAILS" -ge "$MAX_FAILS" ]; then
                echo "Too many consecutive failures, aborting." >&2
                exit 1
              fi
              sleep $((FAILS * 10))
              continue
            fi
            FAILS=0
            COUNT=$((COUNT + 1))
            [ -n "$NEXT" ] && CURSOR="$NEXT"
            if [ "$DRAINED" = "true" ] || [ "$LISTED" = "0" ]; then
              echo "Drained after $COUNT batch(es)."
              break
            fi
            sleep 2
          done
          echo "Completed $COUNT batch(es)."
